plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

// Load environment variables from project root .env file
ext {
    envProperties = new Properties()
    File envFile = file("../.env")
    if (envFile.exists()) {
        envFile.withReader("UTF-8") { reader ->
            envProperties.load(reader)
        }
    }
    
    getEnvValue = { String key, String defaultValue = "" ->
        String envValue = System.getenv(key)
        if (envValue != null) {
            return envValue
        }
        return envProperties.getProperty(key, defaultValue)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "club.aiiko.trip"
    compileSdk = 35
    ndkVersion = "26.1.10909125"
    
    buildFeatures {
        buildConfig true
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
            java.srcDirs += ['libs']
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            // 使用私有签名配置
            storeFile file("trip-release-key.keystore")
            storePassword getEnvValue("TRIP_STORE_PASSWORD")
            keyAlias getEnvValue("TRIP_KEY_ALIAS")
            keyPassword getEnvValue("TRIP_KEY_PASSWORD")
        }
    }

    defaultConfig {
        applicationId = "club.aiiko.trip"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            buildConfigField "String", "GOOGLE_CLIENT_ID", "\"${getEnvValue("GOOGLE_CLIENT_ID_DEV", "YOUR_DEV_GOOGLE_CLIENT_ID")}\""
            buildConfigField "String", "GOOGLE_WEB_CLIENT_ID", "\"${getEnvValue("GOOGLE_WEB_CLIENT_ID", "YOUR_WEB_CLIENT_ID")}\""
        }
        prod {
            dimension "environment"
            buildConfigField "String", "GOOGLE_CLIENT_ID", "\"${getEnvValue("GOOGLE_CLIENT_ID_PROD", "YOUR_PROD_GOOGLE_CLIENT_ID")}\""
            buildConfigField "String", "GOOGLE_WEB_CLIENT_ID", "\"${getEnvValue("GOOGLE_WEB_CLIENT_ID", "YOUR_WEB_CLIENT_ID")}\""
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig = signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
    
    packagingOptions {
        jniLibs {
            // 使用传统的打包方式，压缩 native libraries
            useLegacyPackaging = true
        }
    }
}

repositories {
    google()
    mavenCentral()
    maven { url "https://maven.mozilla.org/maven2/" }
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // GeckoView 143.0 (最新稳定版，支持多架构)
    implementation "org.mozilla.geckoview:geckoview:143.0.20250929153833"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // BYD Auto OpenAPI
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    
    // Google Sign-In
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
}

flutter {
    source = "../.."
}
