name: nyanya_webview
description: A flexible WebView wrapper supporting GeckoView and system WebView switching.
version: 1.0.0
homepage:

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.4.0"

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.1
  sensors_plus: ^6.1.2
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  shared_preferences: ^2.2.0
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.2.0
  wakelock_plus: ^1.2.1
  url_launcher: ^6.3.1
  http: ^1.2.0
  path_provider: ^2.1.0
  shelf: ^1.4.1
  shelf_static: ^1.1.2
  archive: ^3.6.0
  shadcn_ui: ^0.5.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  plugin:
    platforms:
      android:
        package: club.aiiko.nyanya_webview
        pluginClass: NyanyaWebviewPlugin